lter it, and demo the drill through round trip."},{"day":23,"week":3,"title":"Tooltips and conditional formatting","minutes":28,"goal":"You can build a report page tooltip and apply rule-based conditional formatting.","steps":["Add a new page; in Format page set Page information > Allow use as tooltip to On and Canvas settings > Type to Tooltip.","Put two small visuals on the tooltip page, for example a card and a tiny trend line.","On a target chart, set Format > General > Tooltips > Type to Report page and pick your tooltip page, then hover to test.","In a matrix, open Format > Cell elements and turn on Background color or Data bars, then click fx to define rules.","Drive a rule from a measure, for example red background when YoY % is below zero."],"practice":"Ship one matrix where negative YoY cells are visibly flagged and one chart with a custom hover tooltip page."},{"day":24,"week":3,"title":"Field parameters, bookmarks, buttons","minutes":29,"goal":"You can let readers swap measures with a slicer and toggle page states with bookmarks and buttons.","steps":["Open Modeling > New parameter > Fields, add Total Sales, Order Rows, and Customers, and keep Add slicer to this page checked.","Drag the new field parameter into a bar chart's values well; clicking the slicer now swaps the measure live.","Open View > Bookmarks, arrange the page one way, click Add; change something visible and Add a second bookmark.","Insert > Buttons > Blank, then set Action to Bookmark and pick one; style the button label.","Test with Ctrl+click in Desktop; in the Service a plain click works."],"practice":"Build one chart whose measure is chosen by a slicer, plus two buttons that jump between two saved page states."},{"day":25,"week":4,"title":"Theme JSON and accessibility","minutes":27,"goal":"You can apply and edit a report theme JSON and pass a basic accessibility check.","steps":["Open the View ribbon theme gallery, try a built-in theme, then use Customize current theme to set data colors and fonts.","Use the theme dropdown's Save current theme to export the JSON, open it in a text editor, and read name, dataColors, and textClasses.","Edit a color in the JSON, save, and re-import it with Browse for themes.","Add alt text to key visuals under Format > General > Alt text, and set Tab order in the Selection pane (View > Selection).","Check color contrast and never encode meaning by color alone; add labels or icons too."],"practice":"Create a small theme JSON with three brand colors, apply it, and confirm new visuals pick the colors up automatically."},{"day":26,"week":4,"title":"Performance Analyzer","minutes":26,"goal":"You can measure which visuals are slow and apply the common model fixes.","steps":["Open the Optimize ribbon, click Performance analyzer, then Start recording and Refresh visuals.","Read each visual's breakdown: DAX query time versus visual display time; sort to find the worst offender.","Copy the slow visual's query with Copy query to inspect what DAX actually ran.","Apply the usual fixes: fewer visuals per page, measures instead of calculated columns, Single cross-filter direction, remove unused high-cardinality columns.","Record again after each change so you know the fix actually helped."],"practice":"Find your slowest visual, apply one fix, and write down the before and after milliseconds."},{"day":27,"week":4,"title":"Publish, workspaces, refresh","minutes":28,"goal":"You can publish a report to the Power BI Service and set up scheduled refresh.","steps":["Click Home > Publish, sign in, and pick a workspace; My workspace is fine when working solo.","Open app.powerbi.com and notice the report and its semantic model are listed as separate items.","Open the semantic model's Settings > Refresh, store source credentials, and configure a scheduled refresh time.","Know the gateway rule: cloud sources refresh directly, but on-premises files and databases need an On-premises data gateway installed on a machine that can reach them.","Learn the sharing model: a workspace is where a team builds; an app is the packaged read-only distribution of that workspace."],"practice":"Publish your day 8 project, open it in the browser, and either schedule a daily refresh or write down exactly why a gateway would be required."},{"day":28,"week":4,"title":"RLS, dashboards, mobile layout","minutes":30,"goal":"You can restrict data with Row Level Security and adapt a report for phones.","steps":["Open Modeling > Manage roles, create a role named WestOnly, and add a DAX filter on the region table: [Region] = \"West\".","Use Modeling > View as to impersonate the role in Desktop and confirm every visual filters down.","Know that in the Service you assign real users to roles on the semantic model's Security page; RLS does not apply to workspace admins and members.","Distinguish artifacts: reports are multi-page and interactive; dashboards exist only in the Service and are built by pinning visuals from one or more reports.","In Desktop use View > Mobile layout and drag your key visuals onto the phone canvas in priority order."],"practice":"Create one role, verify it with View as, and lay out your main page for mobile with the headline card on top."},{"day":29,"week":4,"title":"Capstone day 1: model and measures","minutes":30,"goal":"You can model a dataset you personally care about and write a working measure set for it.","steps":["Pick real personal data: freelance income, project hours, gym sessions, anything with dates and numbers.","Clean it in Power Query, split it into a fact table plus at least one dimension, add your Date table, and mark it.","Write 8 to 10 measures in a _Measures table: core totals and counts, at least one CALCULATE, one time intelligence measure, and one DIVIDE ratio.","Sanity check every measure in a throwaway matrix before building anything pretty."],"practice":"Finish with a matrix where all 8 to 10 measures show believable values against at least two slicers."},{"day":30,"week":4,"title":"Capstone day 2: publish and present","minutes":30,"goal":"You can design, publish, and verbally present one clean report page.","steps":["Design one page: a clear title, headline cards at the top, one trend visual, one comparison visual, one slicer; align everything and apply your day 25 theme.","Run Performance analyzer once and fix anything obviously slow.","Publish to the Service and open the report in the browser to confirm it looks right outside Desktop.","Record a 3 minute spoken walkthrough: what the data is, what the headline number says, and one insight you did not know before this course.","The spoken walkthrough doubles as Voice practice: one take, out loud, as if a client were listening."],"practice":"Save the recording next to the pbix and listen back once; if you hesitated on any number, you have found tomorrow's review topic."}];

const PILLARS = ['body', 'voice', 'mind', 'craft'];

/* ---------- state ---------- */
function defaults() {
  return {
    days: {},
    streak: { count: 0, best: 0, lastDay: null },
    mind: { cursor: 0 },
    craft: { done: [] },
    settings: { name: '', theme: 'system', voiceURI: '', provider: 'none', apiKey: '', reminderTime: '' },
    flags: { safetySeen: false, reminderFiredOn: '' },
  };
}
function deepMerge(base, extra) {
  if (extra === null || typeof extra !== 'object' || Array.isArray(extra)) return base;
  for (const k of Object.keys(extra)) {
    const v = extra[k];
    if (v && typeof v === 'object' && !Array.isArray(v) && base[k] && typeof base[k] === 'object' && !Array.isArray(base[k])) {
      deepMerge(base[k], v);
    } else if (v !== undefined) {
      base[k] = v;
    }
  }
  return base;
}
function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    return deepMerge(defaults(), raw);
  } catch (e) {
    return defaults();
  }
}
let S = loadState();
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(S)); } catch (e) { /* storage full or blocked */ }
}

/* ---------- small utils ---------- */
const $ = (id) => document.getElementById(id);
function esc(s) {
  return String(s).replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}
function dkey(d = new Date()) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); return d; }
function doy(d = new Date()) {
  return Math.round((Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()) - Date.UTC(d.getFullYear(), 0, 0)) / 86400000);
}
function fmtClock(secs) {
  secs = Math.max(0, Math.ceil(secs));
  return Math.floor(secs / 60) + ':' + String(secs % 60).padStart(2, '0');
}
function hexA(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}
function todayRec() {
  return S.days[dkey()] || { body: false, voice: false, mind: false, craft: false };
}
function doneCountToday() {
  const r = todayRec();
  return PILLARS.filter((p) => r[p]).length;
}
function currentStreak() {
  const t = dkey(), y = dkey(daysAgo(1));
  return (S.streak.lastDay === t || S.streak.lastDay === y) ? S.streak.count : 0;
}
let toastT = null;
function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.hidden = false;
  clearTimeout(toastT);
  toastT = setTimeout(() => { el.hidden = true; }, 2600);
}
function openModal(html) {
  $('modalCard').innerHTML = html;
  $('modal').hidden = false;
  overlayOpened('#modalCard');
}
function closeModal() {
  $('modal').hidden = true;
  overlayClosed();
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  try {
    const u = new SpeechSynthesisUtterance(text);
    const v = speechSynthesis.getVoices().find((x) => x.voiceURI === S.settings.voiceURI);
    if (v) u.voice = v;
    u.rate = 1;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch (e) { /* tts unavailable */ }
}

/* ---------- completion + streak ---------- */
function markDone(p) {
  const k = dkey();
  const day = S.days[k] || (S.days[k] = { body: false, voice: false, mind: false, craft: false });
  if (day[p]) { save(); renderAll(); return; }
  day[p] = true;
  if (PILLARS.every((x) => day[x])) {
    const y = dkey(daysAgo(1));
    S.streak.count = (S.streak.lastDay === y) ? S.streak.count + 1 : 1;
    S.streak.lastDay = k;
    S.streak.best = Math.max(S.streak.best, S.streak.count);
    toast('Perfect day. All four pillars done.');
  } else {
    toast(META[p].name + ' done for today.');
  }
  save();
  renderAll();
}

function applyTheme() {

/* ---------- today's per pillar titles ---------- */
function todaysRoutine() { return BODY_ROUTINES[doy() % BODY_ROUTINES.length]; }
function todaysTopic() { return VOICE_TOPICS[doy() % VOICE_TOPICS.length]; }
function mindPage() { return MIND_PAGES[Math.min(S.mind.cursor, MIND_PAGES.length - 1)]; }
function nextLesson() { return CRAFT_LESSONS.find((l) => !S.craft.done.includes(l.day)) || null; }
function pillarTitle(p) {
  if (p === 'body') return todaysRoutine().name;
  if (p === 'voice') return 'Topic: ' + todaysTopic().title;
  if (p === 'mind') return 'Page ' + (Math.min(S.mind.cursor, MIND_PAGES.length - 1) + 1) + ': ' + mindPage().book;
  const l = nextLesson();
  return l ? 'Day ' + l.day + ': ' + l.title : 'All 30 lessons done';
}
function pillarMinutes(p) {
  if (p === 'body' || p === 'voice') return '12 min';
  if (p === 'mind') return '5 min';
  const l = nextLesson();
  return l ? l.minutes + ' min' : '30 lessons';
}

/* ---------- progress ring ---------- */
function ringSvg() {
  const cx = 59, cy = 59, r = 46, gap = 18, segs = 90;
  const rec = todayRec();
  let defs = '<defs>';
  for (const p of PILLARS) {
    const c = META[p].colors;
    defs += '<linearGradient id="kg-' + p + '" x1="0%" y1="0%" x2="100%" y2="100%">'
      + '<stop offset="0%" stop-color="' + c[0] + '"/><stop offset="50%" stop-color="' + c[1] + '"/><stop offset="100%" stop-color="' + c[2] + '"/></linearGradient>';
  }
  defs += '</defs>';
  const arc = (a0deg, a1deg) => {
    const a0 = (a0deg - 90) * Math.PI / 180, a1 = (a1deg - 90) * Math.PI / 180;
    const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    return 'M ' + x0.toFixed(2) + ' ' + y0.toFixed(2) + ' A ' + r + ' ' + r + ' 0 0 1 ' + x1.toFixed(2) + ' ' + y1.toFixed(2);
  };
  let paths = '';
  PILLARS.forEach((p, i) => {
    const a0 = i * segs + gap / 2, a1 = (i + 1) * segs - gap / 2;
    paths += '<path d="' + arc(a0, a1) + '" fill="none" style="stroke:var(--surface-2)" stroke-width="10" stroke-linecap="round"/>';
    if (rec[p]) {
      paths += '<path d="' + arc(a0, a1) + '" fill="none" stroke="url(#kg-' + p + ')" stroke-width="10" stroke-linecap="round"/>';
    }
  });
  return '<svg viewBox="0 0 118 118" role="img" aria-label="' + doneCountToday() + ' of 4 pillars done today">' + defs + paths + '</svg>';
}

/* ---------- streak mosaic ---------- */
const CORNERS = ['22% 22%', '78% 22%', '22% 78%', '78% 78%'];
function mosaicHtml() {
  const t = dkey();
  let cells = '';
  for (let i = 89; i >= 0; i--) {
    const d = daysAgo(i);
    const k = dkey(d);
    const rec = S.days[k];
    const done = rec ? PILLARS.filter((p) => rec[p]) : [];
    let cls = 'cell', style = '';
    if (done.length === 4) {
      cls += ' mesh mesh-all bloom';
    } else if (done.length > 0) {
      const alpha = 0.42 + done.length * 0.14;
      const layers = done.map((p, j) => 'radial-gradient(circle at ' + CORNERS[j] + ', ' + hexA(META[p].colors[1], alpha) + ' 0%, transparent 75%)');
      style = 'background-image:' + layers.join(',');
    }
    if (k === t) cls += ' today';
    cells += '<button class="' + cls + '" data-day="' + k + '"' + (style ? ' style="' + style + '"' : '') + ' aria-label="' + k + ', ' + done.length + ' of 4 done"></button>';
  }
  return '<div class="mosaic" id="mosaic">' + cells + '</div>';
}
function showPopover(cellEl) {
  const k = cellEl.dataset.day;
  const rec = S.days[k];
  const done = rec ? PILLARS.filter((p) => rec[p]).map((p) => META[p].name) : [];
  const pretty = new Date(k + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  const pop = $('popover');
  pop.innerHTML = '<div class="pdate">' + pretty + '</div>' + (done.length ? done.join(', ') + ' done' : 'Nothing done');
  pop.hidden = false;
  const r = cellEl.getBoundingClientRect();
  const pw = Math.min(220, window.innerWidth - 24);
  let left = r.left + r.width / 2 - pw / 2;
  left = Math.max(12, Math.min(left, window.innerWidth - pw - 12));
  pop.style.left = left + 'px';
  pop.style.width = 'auto';
  pop.style.top = Math.max(12, r.top - pop.offsetHeight - 10) + 'px';
}
document.addEventListener('click', (e) => {
  const cell = e.target.closest('.cell');
  if (cell) { showPopover(cell); return; }
  if (!e.target.closest('#popover')) $('popover').hidden = true;

/* ---------- speech helpers ---------- */
function speakAsync(text) {
  return new Promise((res) => {
    if (!('speechSynthesis' in window)) { res(); return; }
    try {
      const u = new SpeechSynthesisUtterance(text);
      const v = speechSynthesis.getVoices().find((x) => x.voiceURI === S.settings.voiceURI);
      if (v) u.voice = v;
      u.onend = () => res();
      u.onerror = () => res();
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
      setTimeout(res, Math.min(30000, 3000 + text.length * 90));
    } catch (e) { res(); }
  });
}
const SRC = window.SpeechRecognition || window.webkitSpeechRecognition;
const recog = { inst: null, active: false, cb: null };
function startRec(cb) {
  if (!SRC) return false;
  recog.cb = cb;
  if (recog.active) return true;
  const r = new SRC();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'en-US';
  r.onresult = (e) => {
    let fin = '', intr = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const res = e.results[i];
      if (res.isFinal) fin += res[0].transcript + ' ';
      else intr += res[0].transcript;
    }
    if (recog.cb) recog.cb(fin, intr);
  };
  r.onend = () => { if (recog.active && recog.inst === r) { try { r.start(); } catch (e) { /* already running */ } } };
  r.onerror = (e) => {
    if (e.error === 'network' || e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      recog.active = false;
      if (recog.onFail) recog.onFail(e.error);
    }
  };
  recog.inst = r;
  recog.active = true;
  try { r.start(); } catch (e) { recog.active = false; return false; }
  return true;
}
function stopRec() {
  recog.active = false;
  recog.cb = null;
  if (recog.inst) { try { recog.inst.stop(); } catch (e) { /* not running */ } }
}

/* ---------- overlay focus management ---------- */
let lastFocus = null;
function overlayOpened(focusSel) {
  if (!lastFocus) lastFocus = document.activeElement;
  document.querySelector('.wrap').inert = true;
  $('nav').inert = true;
  const f = focusSel && document.querySelector(focusSel);
  if (f) f.focus();
}
function overlayClosed() {
  if (!$('pv').hidden || !$('vv').hidden || !$('modal').hidden || !$('pvDone').hidden) return;
  document.querySelector('.wrap').inert = false;
  $('nav').inert = false;
  if (lastFocus && document.contains(lastFocus)) lastFocus.focus();
  lastFocus = null;
}

  const r = todaysRoutine();
  const rec = todayRec();
  const totalSecs = r.moves.reduce((a, m) => a + m.secs * (m.perSide ? 2 : 1), 0);
  const list = r.moves.map((m) =>
    '<li style="margin-top:5px">' + esc(m.name) + (m.perSide ? ' (each side)' : '') + ' <span class="cap">' + m.secs + 's</span></li>').join('');
  $('view-body').innerHTML =
    '<div class="label">Body</div>'
    + '<div class="card card-lg">'
    + '<div class="h2">' + esc(r.name) + '</div>'
    + '<div class="cap" style="margin-top:4px">' + esc(r.focus) + '. About ' + Math.round(totalSecs / 60) + ' minutes.</div>'
    + (rec.body ? '<div class="cap" style="margin-top:8px;color:var(--text-2)">Done for today. Doing it again never hurts.</div>' : '')
    + '<ul style="margin:12px 0 0 18px;font-size:14px">' + list + '</ul>'
    + '<button class="pill mesh mesh-body" style="margin-top:18px" id="startBody">Start session</button>'
    + '</div>'
    + '<div class="hint" style="margin:12px 6px 0">Stretch to mild tension, never pain. Stop on sharp pain. If a problem persists, see a physiotherapist.</div>';
}

const player = { segs: [], idx: 0, running: false, endAt: 0, remain: 0, timer: null, wake: null, routine: null };
function buildSegs(r) {
  const segs = [];
  for (const m of r.moves) {
    if (m.perSide) {

function voiceStats(raw, secs) {
  const norm = (' ' + raw.toLowerCase().replace(/[^a-z' ]+/g, ' ') + ' ').replace(/\s+/g, ' ');
  let t = norm, multiHits = 0;
  for (const m of ['you know', 'i mean', 'kind of', 'sort of']) {
    const sep = ' ' + m + ' ';
    while (t.includes(sep)) { // loop catches back to back repeats that share a space
      multiHits += t.split(sep).length - 1;
      t = t.split(sep).join(' # ');
    }
  }
  const singles = new Set(['um', 'uh', 'er', 'like', 'basically', 'actually', 'literally']);
  const toks = t.trim() ? t.trim().split(' ') : [];
  let singleHits = 0, run = 0, best = 0;
  const words = [];
  for (const w of toks) {
    if (w === '#' || singles.has(w)) {
      if (w !== '#') singleHits++;
      best = Math.max(best, run);
      run = 0;
    } else { words.push(w); run++; }
  }
  best = Math.max(best, run);
  const total = words.length + singleHits + multiHits * 2;
  const unique = new Set(words).size;
  return {
    total,
    wpm: secs > 10 ? Math.round(total / (secs / 60)) : 0,
    filler: singleHits + multiHits,
    uniq: total ? Math.round(100 * unique / total) : 0,
    run: best,
    mins: Math.max(1, Math.round(secs / 60)),
  };
}

const LIVE_SYS = 'You are a friendly daily small talk partner for an intermediate to advanced ESL speaker. Ask one question at a time. Keep replies to 2 or 3 sentences. Gently correct at most one mistake per turn, in brackets at the end of your reply. Never lecture.';
async function aiReply(msgs) {
  const p = S.settings.provider, k = S.settings.apiKey;
  if (p === 'openai') {
    const r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + k },
      body: JSON.stringify({ model: 'gpt-4o-mini', max_tokens: 220, messages: [{ role: 'system', content: LIVE_SYS }].concat(msgs) }),
    });
    if (!r.ok) throw new Error('OpenAI replied ' + r.status);
    const j = await r.json();
    return j.choices[0].message.content.trim();
  }
  if (p === 'anthropic') {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': k,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 220, system: LIVE_SYS, messages: msgs }),
    });
    if (!r.ok) throw new Error('Anthropic replied ' + r.status);
    const j = await r.json();
    return j.content[0].text.trim();
  }
  throw new Error('no provider set');
}

      const isDone = S.craft.done.includes(l.day);
      return '<details class="lesson" data-day="' + l.day + '"' + (openLessons.includes(l.day) ? ' open' : '') + '>'
        + '<summary><span class="dnum">' + String(l.day).padStart(2, '0') + '</span>'
        + '<span class="ltit">' + esc(l.title) + '</span><span class="lmin">' + l.minutes + ' min</span>'
        + '<button class="chk' + (isDone ? ' on mesh mesh-craft' : '') + '" data-chk="' + l.day + '" aria-label="Mark day ' + l.day + (isDone ? ' as not done' : ' as done') + '" aria-pressed="' + isDone + '">' + ICONS.check + '</button></summary>'
        + '<div class="lbody"><b>Goal.</b> ' + esc(l.goal)
        + '<ul>' + l.steps.map((s) => '<li>' + esc(s) + '</li>').join('') + '</ul>'
        + '<b>Practice.</b> ' + esc(l.practice) + '</div>'
        + '</details>';
    }).join('');
    return '<details class="week card" data-week="' + w + '"' + (open ? ' open' : '') + '>'
      + '<summary><span>Week ' + w + '</span><span class="cap" style="margin-left:auto">' + wdone + ' of ' + ls.length + '</span><span class="chev">' + ICONS.chevD + '</span></summary>'
      + rows + '</details>';
  }).join('');
  $('view-craft').innerHTML =
    '<div class="label">Craft</div>'
    + '<div class="card card-lg">'
    + '<div class="h2">Power BI in 30 days</div>'
    + '<div class="cap" style="margin-top:4px">' + done + ' of ' + total + ' lessons</div>'
    + '<div class="craftbarWrap"><i class="mesh mesh-craft" style="width:' + (done ? Math.max(4, pct) : 0) + '%"></i></div>'
    + (nl ? '<div class="cap" style="margin-top:10px">Today: Day ' + nl.day + ', ' + esc(nl.title) + '</div>' : '<div class="cap" style="margin-top:10px">Course complete. Rebuild something you care about.</div>')
    + '</div>'
    + weeks;
}

/* ---------- settings ---------- */
function renderSettings() {
  const s = S.settings;
  $('view-settings').innerHTML =
    '<div class="label">Settings</div>'
    + '<div class="card">'
    + '<div class="setrow"><label for="setName">Your name</label><input class="input" id="setName" value="' + esc(s.name) + '" autocomplete="given-name"></div>'
    + '<div class="setrow"><label for="setTheme">Theme</label><select class="input" id="setTheme">'
    + ['system', 'light', 'dark'].map((t) => '<option value="' + t + '"' + (s.theme === t ? ' selected' : '') + '>' + t[0].toUpperCase() + t.slice(1) + '</option>').join('')
    + '</select></div>'
    + '<div class="setrow"><label for="setVoice">Spoken voice</label><select class="input" id="setVoice"></select>'
    + '<div class="hint">Used for cues and prompts. Voices come from your device, English first.</div></div>'
    + '</div>'
    + '<div class="label">AI conversation partner</div>'
    + '<div class="card">'
    + '<div class="setrow"><label for="setProvider">Provider</label><select class="input" id="setProvider">'
    + [['none', 'Off'], ['openai', 'OpenAI'], ['anthropic', 'Anthropic']].map((o) => '<option value="' + o[0] + '"' + (s.provider === o[0] ? ' selected' : '') + '>' + o[1] + '</option>').join('')
    + '</select></div>'
    + '<div class="setrow"><label for="setKey">API key</label><input class="input" id="setKey" type="password" value="' + esc(s.apiKey) + '" autocomplete="off">'
    + '<div class="hint">The key is stored only in localStorage on this device and is sent only to the provider you pick.</div></div>'
    + '</div>'
    + '<div class="label">Daily reminder</div>'
    + '<div class="card">'
    + '<div class="setrow"><label for="setTime">Reminder time</label><input class="input" id="setTime" type="time" value="' + esc(s.reminderTime) + '"></div>'
    + '<div class="hint">Honest note: a web app cannot reliably notify you while it is closed. Download the daily reminder and import it into Google Calendar. If Kaizen is open at that time, it also fires a notification.</div>'
    + '<button class="pill pill-quiet" style="margin-top:14px" id="btnIcs">' + ICONS.download + 'Download daily reminder</button>'
    + '</div>'
    + '<div class="label">Data</div>'
    + '<div class="card">'
    + '<div class="btnrow"><button class="pill pill-quiet" id="btnExport">Export JSON</button><button class="pill pill-quiet" id="btnImport">Import JSON</button></div>'
    + '<button class="pill pill-ghost" style="margin-top:12px" id="btnReset">Reset everything</button>'
    + '<input type="file" id="importFile" accept=".json,application/json" hidden>'
    + '</div>';
  fillVoices();
}
function fillVoices() {
  const sel = $('setVoice');
  if (!sel) return;
  if (!('speechSynthesis' in window)) { sel.innerHTML = '<option value="">Not available</option>'; return; }
  const all = speechSynthesis.getVoices();
  const en = all.filter((v) => v.lang && v.lang.toLowerCase().startsWith('en'));
  const rest = all.filter((v) => !en.includes(v));
  sel.innerHTML = '<option value="">Device default</option>'
    + en.concat(rest).map((v) => '<option value="' + esc(v.voiceURI) + '"' + (S.settings.voiceURI === v.voiceURI ? ' selected' : '') + '>' + esc(v.name + ' (' + v.lang + ')') + '</option>').join('');
}
function downloadBlob(content, fname, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type }));
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
function downloadIcs() {
  const t = S.settings.reminderTime || '19:00';
  const hh = +t.split(':')[0], mm = +t.split(':')[1];
  const now = new Date();
  const st = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hh, mm, 0);
  if (st <= now) st.setDate(st.getDate() + 1);
  const p = (n) => String(n).padStart(2, '0');
  const dt = st.getFullYear() + p(st.getMonth() + 1) + p(st.getDate()) + 'T' + p(st.getHours()) + p(st.getMinutes()) + '00';
  const stamp = now.getUTCFullYear() + p(now.getUTCMonth() + 1) + p(now.getUTCDate()) + 'T' + p(now.getUTCHours()) + p(now.getUTCMinutes()) + p(now.getUTCSeconds()) + 'Z';
  const ics = [
    'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Kaizen//Daily//EN',
    'BEGIN:VEVENT', 'UID:kaizen-daily-reminder', 'DTSTAMP:' + stamp, 'DTSTART:' + dt,
    'RRULE:FREQ=DAILY', 'SUMMARY:Kaizen: today\'s stack',
    'DESCRIPTION:Body, Voice, Mind, Craft. About 40 minutes.',
    'BEGIN:VALARM', 'TRIGGER:PT0S', 'ACTION:DISPLAY', 'DESCRIPTION:Kaizen', 'END:VALARM',
    'END:VEVENT', 'END:VCALENDAR',
  ].join('\r\n');
  downloadBlob(ics, 'kaizen-daily.ics', 'text/calendar');
  toast('Downloaded. Import it into Google Calendar.');
}
setInterval(() => {
  const t = S.settings.reminderTime;
  if (!t) return;
  const now = new Date();
  const cur = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  if (cur === t && S.flags.reminderFiredOn !== dkey()) {
    S.flags.reminderFiredOn = dkey();
    save();
    if ('Notification' in window && Notification.permission === 'granted') {
      const opts = { body: 'Time for today\'s stack.', icon: './icon-192.png' };
      if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        // page-context new Notification() throws on Android Chrome, the SW path works everywhere
        navigator.serviceWorker.ready.then((reg) => reg.showNotification('Kaizen', opts)).catch(() => { /* ignore */ });
      } else {
        try { new Notification('Kaizen', opts); } catch (e) { /* ignore */ }
      }
    }
  }
}, 20000);

/* ---------- events ---------- */
document.addEventListener('click', (e) => {
  const hit = (id) => e.target.closest('#' + id);
  if (hit('startBody')) { maybeStartBody(); return; }
  if (hit('safetyGo')) { S.flags.safetySeen = true; save(); closeModal(); startBodySession(); return; }
  if (hit('startVoice')) { startVoiceSession(); return; }
  if (hit('startLive')) { startLiveSession(); return; }
  if (hit('vvClose')) { closeVoice(); return; }
  if (hit('vvSkipPhase')) { startPhase(vs.phase + 1); return; }
  if (hit('vvEnd')) { finishGuided(); return; }
  if (hit('vvCopy')) {
    const showGpt = () => { const b = $('vvGpt'); if (b) b.hidden = false; };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(lastCopy).then(() => { toast('Copied. Paste it to your AI coach.'); showGpt(); }).catch(() => {
        openModal('<div class="h2">Copy manually</div><p>Clipboard access was blocked. Select everything below and copy it.</p><textarea class="input" style="min-height:180px;margin-top:10px">' + esc(lastCopy) + '</textarea><button class="pill pill-quiet" data-close>Done</button>');
        showGpt();
      });
    } else {
      openModal('<div class="h2">Copy manually</div><p>Select everything below and copy it.</p><textarea class="input" style="min-height:180px;margin-top:10px">' + esc(lastCopy) + '</textarea><button class="pill pill-quiet" data-close>Done</button>');
      showGpt();
    }
    return;
  }
  if (hit('vvGpt')) { window.open('https://chatgpt.com', '_blank', 'noopener'); return; }
  if (hit('vvFinish')) { markDone('voice'); closeVoice(); return; }
  if (hit('lvEnd')) { closeVoice(); return; }
  if (hit('lvDoneBtn')) { commitUtter(); return; }
  if (hit('lvSend')) { sendTyped(); return; }
  if (hit('lvFinish')) { finishLive(); return; }
  if (hit('mindPrev')) { if (mindView > 0) { mindView--; renderMind(); } return; }
  if (hit('mindNext')) { if (mindView < MIND_PAGES.length - 1) { mindView++; renderMind(); } return; }
  if (hit('mindMark')) {
    if (mindView === S.mind.cursor && S.mind.cursor < MIND_PAGES.length - 1) S.mind.cursor++;
    markDone('mind');
    const nx = $('mindNext');
    if (nx) nx.focus();
    return;
  }
  if (hit('btnIcs')) { downloadIcs(); return; }
  if (hit('btnExport')) { downloadBlob(JSON.stringify(S, null, 2), 'kaizen-backup.json', 'application/json'); toast('Exported.'); return; }
  if (hit('btnImport')) { $('importFile').click(); return; }
  if (hit('btnReset')) {
    if (confirm('Delete all Kaizen data on this device? Export first if you want a backup.')) {
      localStorage.removeItem(STORE_KEY);
      S = loadState();
      mindView = null;
      applyTheme();
      setTab('today');
      toast('Fresh start.');
    }
    return;
  }
  if (e.target.closest('[data-close]')) { closeModal(); return; }
  if (e.target.id === 'modal') { closeModal(); return; }
  const chk = e.target.closest('[data-chk]');
  if (chk) {
    e.preventDefault();
    const day = +chk.dataset.chk;
    const i = S.craft.done.indexOf(day);
    if (i >= 0) {
      S.craft.done.splice(i, 1);
      const k = dkey(), rec = S.days[k];
      if (rec && rec.craft) {
        // roll the day and any streak it earned back so Today stays truthful
        rec.craft = false;
        if (S.streak.lastDay === k) {
          S.streak.count = Math.max(0, S.streak.count - 1);
          S.streak.lastDay = S.streak.count > 0 ? dkey(daysAgo(1)) : null;
        }
      }
      save();
      renderAll();
    } else {
      S.craft.done.push(day);
      S.craft.done.sort((a, b) => a - b);
      save();
      markDone('craft');
    }
    const nb = document.querySelector('[data-chk="' + day + '"]');
    if (nb) nb.focus();
    return;
  }
});
document.addEventListener('change', (e) => {
  const id = e.target.id;
  if (id === 'setName') { S.settings.name = e.target.value; save(); renderHeader(); }
  if (id === 'setTheme') { S.settings.theme = e.target.value; save(); applyTheme(); }
  if (id === 'setVoice') { S.settings.voiceURI = e.target.value; save(); speak('This is how I sound.'); }
  if (id === 'setProvider') { S.settings.provider = e.target.value; save(); }
  if (id === 'setKey') { S.settings.apiKey = e.target.value.trim(); save(); }
  if (id === 'setTime') {
    S.settings.reminderTime = e.target.value;
    save();
    if (e.target.value && 'Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  }
  if (id === 'importFile') {
    const f = e.target.files[0];
    if (!f) return;
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const parsed = JSON.parse(rd.result);
        if (!parsed || typeof parsed !== 'object') throw new Error('bad');
        S = deepMerge(defaults(), parsed);
        save();
        mindView = null;
        applyTheme();
        renderAll();
        toast('Imported.');
      } catch (err) {
        toast('That file is not a valid Kaizen export.');
      }
    };
    rd.readAsText(f);
    e.target.value = '';
  }
});
$('themeBtn').addEventListener('click', () => {
  const dark = document.documentElement.dataset.theme === 'dark';
  S.settings.theme = dark ? 'light' : 'dark';
  save();
  applyTheme();
  const sel = $('setTheme');
  if (sel) sel.value = S.settings.theme;
});
$('gearBtn').addEventListener('click', () => setTab('settings'));
$('pvClose').addEventListener('click', closePlayer);
$('pvPrev').addEventListener('click', () => startSeg(player.idx - 1));
$('pvPause').addEventListener('click', pausePlayer);
$('pvSkip').addEventListener('click', () => startSeg(player.idx + 1));
$('pvFinish').addEventListener('click', () => { $('pvDone').hidden = true; overlayClosed(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.target.id === 'lvInput') { sendTyped(); return; }
  if (e.key !== 'Escape') return;
  if (!$('modal').hidden) { closeModal(); return; }
  if (!$('pv').hidden) { closePlayer(); return; }
  if (!$('vv').hidden) closeVoice();
});

/* ---------- boot ---------- */
const RENDER = {
  today: renderToday, body: renderBodyView, voice: renderVoiceView,
  mind: renderMind, craft: renderCraft, settings: renderSettings,
};
function renderAll() {
  renderHeader();
  RENDER[currentTab]();
}
function init() {
  $('pvClose').innerHTML = ICONS.x;
  $('pvPrev').innerHTML = ICONS.prev;
  $('pvPause').innerHTML = ICONS.pause;
  $('pvSkip').innerHTML = ICONS.next;
  applyTheme();
  renderHeader();
  setTab('today');
  if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = fillVoices;
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => { /* offline first run */ }));
  }
}
init();
</script>
